name: Build & Release Desktop

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  NODE_VERSION: "22.11.0"
  NODE_OPTIONS: "--max-old-space-size=4096"

# 同一分支/tag 的新推送取消进行中的旧构建,避免 nightly 堆积
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            node_asset: darwin-arm64
          - platform: macos-15-intel
            target: x86_64-apple-darwin
            node_asset: darwin-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            node_asset: win-x64
          - platform: windows-11-arm
            target: aarch64-pc-windows-msvc
            node_asset: win-arm64

    runs-on: ${{ matrix.platform }}
    # tauri-action 需要创建/更新 GitHub Release,必须显式授予 contents: write
    # 否则默认 GITHUB_TOKEN 权限不足 → "Resource not accessible by integration"
    permissions:
      contents: write
    outputs:
      # 矩阵各 leg 的 steps.rel.outputs.tag_name 相同(SHA 与日期一致),
      # 通过 job output 传递给 sync-nightly,避免跨午夜重算日期导致归档 tag 漂移
      archive_tag: ${{ steps.rel.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v4

      # pnpm 版本由 package.json 的 packageManager 字段(Corepack)统一管理,无需在此重复指定
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.target }}

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Build sidecar bundle
        working-directory: sidecar
        run: |
          pnpm install --frozen-lockfile
          pnpm run bundle

      - name: Copy sidecar bundle and native binary to resources
        shell: bash
        run: node sidecar/scripts/setup-resources.mjs --no-bundle

      - name: Download Node.js runtime (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          curl -fsSL "https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}-${{ matrix.node_asset }}.tar.gz" -o node.tar.gz
          mkdir -p node-extracted
          tar xzf node.tar.gz -C node-extracted --strip-components=1
          mkdir -p src-tauri/resources/node-runtime
          cp -r node-extracted/bin src-tauri/resources/node-runtime/
          cp -r node-extracted/lib src-tauri/resources/node-runtime/
          cp -r node-extracted/include src-tauri/resources/node-runtime/ 2>/dev/null || true
          echo "=== node-runtime contents ==="
          ls -la src-tauri/resources/node-runtime/bin/

      - name: Download Node.js runtime (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $url = "https://nodejs.org/dist/v${{ env.NODE_VERSION }}/node-v${{ env.NODE_VERSION }}-${{ matrix.node_asset }}.zip"
          Invoke-WebRequest -Uri $url -OutFile node.zip
          Expand-Archive node.zip -DestinationPath node-extracted
          New-Item -ItemType Directory -Force -Path src-tauri/resources/node-runtime
          $src = Get-ChildItem node-extracted | Select-Object -First 1
          Copy-Item "$($src.FullName)/*" src-tauri/resources/node-runtime/ -Recurse -Force
          Write-Host "=== node-runtime contents ==="
          Get-ChildItem src-tauri/resources/node-runtime/

      - name: Verify resources
        shell: bash
        run: |
          echo "=== resources/sidecar ==="
          ls -lh src-tauri/resources/sidecar/
          if [ "${{ runner.os }}" = "Windows" ]; then
            test -f src-tauri/resources/sidecar/claude.exe || { echo "ERROR: claude.exe not found"; exit 1; }
          else
            test -f src-tauri/resources/sidecar/claude || { echo "ERROR: claude binary not found"; exit 1; }
          fi
          echo "Native CLI binary verified."

      - name: Write Apple API key (macOS only)
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        run: |
          mkdir -p private_keys
          printf '%s\n' "$APPLE_API_KEY_CONTENT" > "private_keys/AuthKey_${APPLE_API_KEY}.p8"

      # ---- 计算 release 元数据:tag(v*) → 正式;其他(main/手动) → nightly prerelease ----
      - name: Compute release metadata
        id: rel
        shell: bash
        run: |
          BASE_VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAG_VERSION="${GITHUB_REF#refs/tags/v}"
            IS_NIGHTLY=false
            TAG_NAME="${GITHUB_REF#refs/tags/}"
            APP_VERSION="${TAG_VERSION}"
            PRERELEASE=false
            RELEASE_NAME="Rabbit Coding ${TAG_NAME}"
          else
            # MSI/WiX 要求版本号预发布段为纯数字且 ≤65535(见 tauri-apps/tauri#5286,
            # 且不做任何自动转换)。故 nightly 用「距 2024-01-01 的天数」作为预发布段
            # (纯数字;2026 年约 898,远低于 65535,数百年内不会溢出),使所有平台(含 MSI)
            # 一次构建通过。日期 + sha 仍保留在下方 Release 标题里。
            DAYS=$(node -e "console.log(Math.floor((Date.now()-Date.parse('2024-01-01T00:00:00Z'))/86400000))")
            DATE=$(date -u +%Y%m%d)
            SHORT_SHA=${GITHUB_SHA::7}
            IS_NIGHTLY=true
            TAG_NAME="nightly-${DATE}-${SHORT_SHA}"
            APP_VERSION="${BASE_VERSION}-${DAYS}"
            PRERELEASE=true
            RELEASE_NAME="Nightly ${DATE} (${SHORT_SHA})"
          fi

          echo "is_nightly=${IS_NIGHTLY}"      >> "$GITHUB_OUTPUT"
          echo "tag_name=${TAG_NAME}"          >> "$GITHUB_OUTPUT"
          echo "app_version=${APP_VERSION}"    >> "$GITHUB_OUTPUT"
          echo "prerelease=${PRERELEASE}"      >> "$GITHUB_OUTPUT"
          echo "release_name=${RELEASE_NAME}"  >> "$GITHUB_OUTPUT"
          echo "bundle_args="                  >> "$GITHUB_OUTPUT"

      # ---- 注入版本号(正式=tag,nightly=计算值);nightly 同时把 updater endpoint 指向 nightly tag ----
      - name: Inject version & endpoint
        env:
          APP_VERSION: ${{ steps.rel.outputs.app_version }}
          IS_NIGHTLY: ${{ steps.rel.outputs.is_nightly }}
          REPO: ${{ github.repository }}
        run: |
          node -e "const fs=require('fs');const f='src-tauri/tauri.conf.json';const c=JSON.parse(fs.readFileSync(f,'utf8'));c.version=process.env.APP_VERSION;if(process.env.IS_NIGHTLY==='true'&&c.plugins&&c.plugins.updater){c.plugins.updater.endpoints=['https://github.com/'+process.env.REPO+'/releases/download/nightly/latest.json'];}fs.writeFileSync(f,JSON.stringify(c,null,2));"
          echo "Injected version: $APP_VERSION (nightly=$IS_NIGHTLY)"

      # ---- 构建 + 发布到 GitHub Releases + 自动生成 latest.json(updater 用)+ 签名 ----
      - name: Build & publish (tauri-action)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # updater manifest 签名密钥(客户端校验)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Apple 代码签名 + 公证(透传给 tauri build)
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ github.workspace }}/private_keys/AuthKey_${{ secrets.APPLE_API_KEY }}.p8
        with:
          tauriScript: pnpm tauri
          tagName: ${{ steps.rel.outputs.tag_name }}
          releaseName: ${{ steps.rel.outputs.release_name }}
          releaseBody: '各平台安装包见下方 Assets。macOS 构建已签名 + 公证。'
          releaseDraft: false
          prerelease: ${{ steps.rel.outputs.prerelease }}
          updaterJsonPreferNsis: true
          args: --target ${{ matrix.target }} ${{ steps.rel.outputs.bundle_args }}

  # ---- 同步滚动 nightly tag/release:始终指向最新构建,供 updater 和稳定下载入口 ----
  sync-nightly:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync nightly rolling tag & release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHORT_SHA_FULL: ${{ github.sha }}
          # build job 实际创建的归档 tag,避免本 job 重算日期导致跨午夜漂移
          ARCHIVE_TAG_FROM_BUILD: ${{ needs.build.outputs.archive_tag }}
        run: |
          SHORT_SHA="${SHORT_SHA_FULL::7}"

          # ---- 优先使用 build job 传递的实际 tag ----
          ARCHIVE_TAG="${ARCHIVE_TAG_FROM_BUILD}"

          # ---- 兜底:build 未传递时按 SHA 自动发现 ----
          if [ -z "$ARCHIVE_TAG" ]; then
            echo "WARN: build job did not pass archive_tag, discovering by SHA..."
            ARCHIVE_TAG=$(gh release list --json tagName --jq ".[].tagName" \
              | grep "^nightly-.*-${SHORT_SHA}$" | head -1)
          fi

          if [ -z "$ARCHIVE_TAG" ]; then
            echo "ERROR: No archive release found for commit ${SHORT_SHA}."
            echo "Build job may have failed to publish."
            exit 1
          fi

          echo "Archive tag: $ARCHIVE_TAG"

          echo "=== Syncing nightly tag to latest commit ==="
          # force-move nightly tag 到当前 commit
          git push origin :refs/tags/nightly 2>/dev/null || true
          git tag -f nightly "$SHORT_SHA_FULL"
          git push origin refs/tags/nightly

          echo "=== Recreating nightly release ==="
          # 删除旧的滚动 nightly release
          gh release delete nightly -y 2>/dev/null || true
          # 创建新的滚动 nightly release(prerelease)
          gh release create nightly \
            --target "$SHORT_SHA_FULL" \
            --title "Nightly (Latest Build)" \
            --notes "Latest nightly build. Archived builds: nightly-* tags." \
            --prerelease

          echo "=== Copying assets from $ARCHIVE_TAG to nightly ==="
          # 从独立归档 release 下载全部 assets(安装包 + latest.json),上传到滚动 release
          TEMP_DIR=$(mktemp -d)
          gh release download "$ARCHIVE_TAG" --dir "$TEMP_DIR" --clobber
          gh release upload nightly "$TEMP_DIR"/* --clobber
          rm -rf "$TEMP_DIR"

          echo "=== Done. nightly release synced. ==="
