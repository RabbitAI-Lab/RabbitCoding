<!doctype html>
<html lang="en">
  <head>
    <script>
      (function () {
        try {
          var stored = JSON.parse(localStorage.getItem('app-theme') || '"system"');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var dark = stored === 'dark' || (stored === 'system' && prefersDark);
          var root = document.documentElement;
          root.classList.toggle('dark', dark);
          root.style.colorScheme = dark ? 'dark' : 'light';
        } catch (e) {}
        try {
          var params = new URLSearchParams(window.location.search);
          if (params.get('window') === 'pet') {
            document.documentElement.classList.add('pet-window-document');
            document.documentElement.style.background = 'transparent';
          }
        } catch (e) {}
      })();
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/avatar.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tauri + React + Typescript</title>
  </head>

  <body>
    <script>
      (function () {
        try {
          var params = new URLSearchParams(window.location.search);
          if (params.get('window') === 'pet') {
            document.body.classList.add('pet-window-document');
            document.body.style.background = 'transparent';
          }
        } catch (e) {}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
